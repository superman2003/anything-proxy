{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-100 to-purple-100" x-data="loginApp()">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Anything Proxy</h1>
            <p class="text-gray-500 mt-1">管理后台</p>
        </div>

        <form @submit.prevent="login" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">管理密码</label>
                <input type="password" x-model="password" required autofocus
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                    placeholder="请输入管理密码">
            </div>

            <div x-show="error" x-cloak class="text-red-500 text-sm bg-red-50 p-3 rounded-lg" x-text="error"></div>

            <button type="submit" :disabled="loading"
                class="w-full py-3 bg-primary hover:bg-primary-dark text-white font-medium rounded-lg transition disabled:opacity-50">
                <span x-show="!loading">登 录</span>
                <span x-show="loading">登录中...</span>
            </button>
        </form>
    </div>
</div>

<script>
function loginApp() {
    return {
        password: '',
        error: '',
        loading: false,
        async login() {
            this.error = '';
            this.loading = true;
            try {
                const resp = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: this.password})
                });
                const data = await resp.json();
                if (resp.ok && data.success) {
                    window.location.href = '/admin/';
                } else {
                    this.error = data.detail || '密码错误';
                }
            } catch (e) {
                this.error = '网络错误，请重试';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
